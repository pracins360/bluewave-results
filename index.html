<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Blue Wave Football Tracker</title>
<style>
:root{--blue:#0057b8;--deep:#003a7a;--sky:#00a7e1;--gold:#ffd23f;--soft:#eef8ff;--dark:#08233f;--white:#fff}
*{box-sizing:border-box} body{margin:0;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(180deg,#dff5ff,#fff);color:var(--dark)}
.app{max-width:560px;margin:auto;min-height:100vh;background:#fff;box-shadow:0 0 30px rgba(0,57,120,.18);padding-bottom:20px}
.header{background:linear-gradient(135deg,var(--deep),var(--blue),var(--sky));color:white;padding:14px 16px;position:sticky;top:0;z-index:5}
.top{display:flex;justify-content:space-between;align-items:center;gap:10px}.top b{font-size:18px}.top a,.top button{border:0;border-radius:999px;background:rgba(255,255,255,.18);color:#fff;padding:8px 10px;text-decoration:none;font-weight:bold}
.content{padding:14px}.card{background:var(--soft);border:1px solid #d9efff;border-radius:18px;padding:14px;margin:12px 0}.hide{display:none!important}.muted{color:#607a91;font-size:13px}.center{text-align:center}
.tabs{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-top:12px}.tabs button{border:0;border-radius:12px;padding:10px 4px;background:rgba(255,255,255,.92);color:var(--deep);font-weight:bold;font-size:11px}.tabs button.active{background:var(--gold);color:var(--deep)}
.search{display:flex;gap:8px}.search input{flex:1;border:1px solid #b8ddff;border-radius:14px;padding:13px;font-size:16px}.search button{border:0;border-radius:14px;padding:0 14px;background:var(--blue);color:white;font-weight:bold}
.quick{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.quick button{border:0;border-radius:999px;padding:8px 10px;background:#e5f4ff;color:var(--deep);font-weight:bold}
.countryHead{display:flex;gap:12px;align-items:center}.flag{font-size:42px}.tag{color:var(--blue);font-weight:bold}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.stat{background:#fff;border-radius:14px;padding:12px;text-align:center}.stat b{font-size:22px;color:var(--blue)}
.meter{height:18px;background:#d7ecff;border-radius:999px;overflow:hidden}.meter span{height:100%;display:block;background:linear-gradient(90deg,var(--sky),var(--blue),var(--gold));border-radius:999px}.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}.actions a,.actions button{border:0;border-radius:14px;padding:12px;background:var(--deep);color:white;text-decoration:none;text-align:center;font-weight:bold}
.match{display:flex;justify-content:space-between;gap:10px;background:white;border-radius:14px;padding:10px;margin:8px 0;align-items:center}.match b{color:var(--deep)}.score{font-weight:bold;color:var(--blue);padding:0 6px}.dateBadge{font-size:12px;color:#607a91;white-space:nowrap}
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}.dow{text-align:center;font-weight:bold;color:#607a91;font-size:12px}.day{border:0;border-radius:12px;padding:10px 0;background:white;color:var(--deep);font-weight:bold}.day.has{background:#d7ecff;border:2px solid var(--sky)}.day.active{background:var(--blue);color:white}.dateMatches{margin-top:12px}
.bracketStage{background:white;border-radius:14px;padding:10px;margin:10px 0}.bracketStage h4{margin:0 0 8px;color:var(--blue)}.factBox{background:white;border-left:4px solid var(--sky);border-radius:8px;padding:12px;margin:10px 0;font-size:15px;line-height:1.4}
.tableWrap{overflow:auto}.standings{width:100%;border-collapse:collapse;background:white;border-radius:14px;overflow:hidden}.standings th,.standings td{padding:8px;border-bottom:1px solid #e3f2ff;text-align:center;font-size:13px}.standings th:first-child,.standings td:first-child{text-align:left}.standings th{background:#d7ecff;color:var(--deep)}
.notice{background:#fff7d6;border:1px solid #ffe28a;color:#5f4b00;border-radius:14px;padding:10px;margin:10px 0;font-size:13px}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="top">
      <a href="javascript:history.back()">вЖР Back</a>
      <b>рЯМК Blue Wave Football</b>
      <button onclick="shareApp()">Share</button>
    </div>
    <div class="tabs">
      <button id="tab-countries" class="active" onclick="showTab('countries')">рЯМН<br>Countries</button>
      <button id="tab-results" onclick="showTab('results')">рЯПЖ<br>Results</button>
      <button id="tab-calendar" onclick="showTab('calendar')">рЯУЕ<br>Calendar</button>
      <button id="tab-bracket" onclick="showTab('bracket')">рЯ•Е<br>Bracket</button>
      <button id="tab-facts" onclick="showTab('facts')">рЯТ°<br>Facts</button>
    </div>
  </div>
  <div class="content">
    <div class="notice">Data is managed from your Blue Wave Google Sheet. Update the sheet, refresh this page, and the app changes automatically.</div>

    <section id="countries" class="panel">
      <div class="card">
        <h2>Choose country or pool</h2>
        <div class="search"><input id="countryInput" placeholder="Cura√Іao"><button onclick="loadCountry()">рЯФН</button></div>
        <div id="quickCountries" class="quick"></div>
      </div>
      <div id="countryCard" class="card hide"></div>
      <div id="standingsCard" class="card"></div>
    </section>

    <section id="results" class="panel hide"><div id="resultsPanel" class="card"></div></section>
    <section id="calendar" class="panel hide"><div id="calendarPanel" class="card"></div></section>
    <section id="bracket" class="panel hide"><div id="bracketPanel" class="card"></div></section>
    <section id="facts" class="panel hide"><div id="factsPanel" class="card"></div></section>
  </div>
</div>
<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyWVP3ZJZ_Hxhx5U2dWrzfvWRlcfemc7oOj6-mCniVkW5Sci2cusBJFy6ydnkNO4-pg/exec";
let DATA={countries:[],matches:[],bracket:[],facts:[]};
function norm(s){return (s||'').toString().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim()}
function flagFor(country){const m={'curacao':'рЯЗ®рЯЗЉ','cura√Іao':'рЯЗ®рЯЗЉ','brazil':'рЯЗІрЯЗЈ','germany':'рЯЗ©рЯЗ™','argentina':'рЯЗ¶рЯЗЈ','france':'рЯЗЂрЯЗЈ','fransia':'рЯЗЂрЯЗЈ','spain':'рЯЗ™рЯЗЄ','usa':'рЯЗЇрЯЗЄ','united states':'рЯЗЇрЯЗЄ','netherlands':'рЯЗ≥рЯЗ±','italy':'рЯЗЃрЯЗє','england':'рЯПі','portugal':'рЯЗµрЯЗє','colombia':'рЯЗ®рЯЗі','mexico':'рЯЗ≤рЯЗљ','japan':'рЯЗѓрЯЗµ','south korea':'рЯЗ∞рЯЗЈ','haiti':'рЯЗ≠рЯЗє','turkey':'рЯЗєрЯЗЈ','turkiye':'рЯЗєрЯЗЈ','cote d\'ivoire':'рЯЗ®рЯЗЃ','c√іte d\'ivoire':'рЯЗ®рЯЗЃ','ivory coast':'рЯЗ®рЯЗЃ','ecuador':'рЯЗ™рЯЗ®'};return m[norm(country)]||'вЪљ'}
function get(o,...keys){for(const k of keys){if(o && o[k]!==undefined && o[k]!==null && o[k]!== '')return o[k]}return ''}
function ymd(v){if(!v)return'';const s=String(v);if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;const d=new Date(s);if(isNaN(d))return s;const local=new Date(d.getTime()+d.getTimezoneOffset()*60000);return [local.getFullYear(),String(local.getMonth()+1).padStart(2,'0'),String(local.getDate()).padStart(2,'0')].join('-')}
function addDays(iso,days){const [y,m,d]=iso.split('-').map(Number);const dt=new Date(y,m-1,d);dt.setDate(dt.getDate()+days);return [dt.getFullYear(),String(dt.getMonth()+1).padStart(2,'0'),String(dt.getDate()).padStart(2,'0')].join('-')}
function weekDay(iso){const [y,m,d]=iso.split('-').map(Number);return new Date(y,m-1,d).getDay()}
function normalizeAll(j){
 DATA.countries=(j.countries||[]).map(r=>({Country:get(r,'Country','country'),Group:get(r,'Group','Pool','group'),Pos:get(r,'Pos','Position','pos'),Pts:get(r,'Pts','Points','points'),W:get(r,'W','Wins'),D:get(r,'D','Draws'),L:get(r,'L','Losses'),GF:get(r,'GF','For'),GA:get(r,'GA','Against'),Status:get(r,'Status'),Analysis:get(r,'Analysis'),LastMatch:get(r,'LastMatch','Last Match'),NextMatch:get(r,'NextMatch','Next Match'),Wave:get(r,'Wave','WAVE%','WAVE %')})).filter(c=>c.Country);
 DATA.matches=(j.matches||[]).map(r=>({Date:ymd(get(r,'Date','date')),Team1:get(r,'Team1','team1'),Team2:get(r,'Team2','team2'),Score1:get(r,'Score1','score1'),Score2:get(r,'Score2','score2'),Status:get(r,'Status','status')})).filter(m=>m.Date&&m.Team1&&m.Team2);
 DATA.bracket=(j.bracket||[]).map(r=>({Stage:get(r,'Stage'),Team1:get(r,'Team1'),Team2:get(r,'Team2'),Score1:get(r,'Score1'),Score2:get(r,'Score2'),Winner:get(r,'Winner')})).filter(b=>b.Stage);
 DATA.facts=(j.facts||[]).map(r=>get(r,'Fact','fact')).filter(Boolean);
}
function showTab(id){document.querySelectorAll('.panel').forEach(p=>p.classList.add('hide'));document.getElementById(id).classList.remove('hide');document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));document.getElementById('tab-'+id).classList.add('active');if(id==='results')renderResults();if(id==='calendar')renderCalendar();if(id==='bracket')renderBracket();if(id==='facts')renderFacts();if(id==='countries')renderStandings()}
function quickButtons(){document.getElementById('quickCountries').innerHTML=DATA.countries.slice(0,12).map(c=>`<button onclick="selectCountry('${String(c.Country).replace(/'/g,"\\'")}')">${flagFor(c.Country)} ${c.Country}</button>`).join('')}
function selectCountry(name){document.getElementById('countryInput').value=name;loadCountry()}
function loadCountry(){const q=norm(document.getElementById('countryInput').value);const c=DATA.countries.find(x=>norm(x.Country)===q);if(!c){document.getElementById('countryCard').classList.remove('hide');document.getElementById('countryCard').innerHTML='<h3>Country not found</h3><p class="muted">Check the spelling or add the country in the COUNTRIES sheet.</p>';return}renderCountry(c)}
function renderCountry(c){const wave=Number(c.Wave||0);const yt='https://www.youtube.com/results?search_query='+encodeURIComponent(c.Country+' World Cup 2026 highlights');document.getElementById('countryCard').innerHTML=`<div class="countryHead"><span class="flag">${flagFor(c.Country)}</span><div><h2>${c.Country}</h2><span class="tag">Group ${c.Group||''}</span></div></div><h3>${c.Status||''}</h3><p>${c.Analysis||''}</p><div class="grid"><div class="stat"><b>${c.Pts||0}</b><p>Pts</p></div><div class="stat"><b>${c.Pos||''}</b><p>Pos</p></div><div class="stat"><b>${c.W||0}-${c.D||0}-${c.L||0}</b><p>W-D-L</p></div><div class="stat"><b>${c.GF||0}:${c.GA||0}</b><p>GF:GA</p></div></div><p><b>Last:</b> ${c.LastMatch||'-'}</p><p><b>Next:</b> ${c.NextMatch||'-'}</p><p><b>Blue Wave Meter:</b> ${wave}%</p><div class="meter"><span style="width:${Math.max(0,Math.min(100,wave))}%"></span></div><br><div class="actions"><a href="${yt}" target="_blank">рЯОђ Highlights</a><button onclick="shareCountry('${String(c.Country).replace(/'/g,"\\'")}')">рЯУ§ Share</button></div>`;document.getElementById('countryCard').classList.remove('hide')}
function renderStandings(){const groups={};DATA.countries.forEach(c=>{const g=c.Group||'?';if(!groups[g])groups[g]=[];groups[g].push(c)});const html=Object.entries(groups).sort().map(([g,rows])=>`<h3>Group ${g}</h3><div class="tableWrap"><table class="standings"><tr><th>Team</th><th>Pos</th><th>Pts</th><th>W</th><th>D</th><th>L</th><th>GF</th><th>GA</th></tr>${rows.sort((a,b)=>(Number(a.Pos)||99)-(Number(b.Pos)||99)).map(c=>`<tr onclick="selectCountry('${String(c.Country).replace(/'/g,"\\'")}')"><td>${flagFor(c.Country)} ${c.Country}</td><td>${c.Pos||''}</td><td>${c.Pts||0}</td><td>${c.W||0}</td><td>${c.D||0}</td><td>${c.L||0}</td><td>${c.GF||0}</td><td>${c.GA||0}</td></tr>`).join('')}</table></div>`).join('');document.getElementById('standingsCard').innerHTML='<h2>рЯУК Standings</h2>'+(html||'<p class="muted">No countries loaded yet.</p>')}
function score(m){return(m.Score1!==''&&m.Score2!=='')?`<span class="score">${m.Score1} - ${m.Score2}</span>`:'<span class="muted">vs</span>'}
function matchLine(m){const q=encodeURIComponent(`${m.Team1} vs ${m.Team2} world cup highlights`);return`<div class="match" onclick="window.open('https://www.youtube.com/results?search_query=${q}','_blank')"><div><b>${m.Team1}</b> ${score(m)} <b>${m.Team2}</b></div><span class="dateBadge">${m.Date}</span></div>`}
function renderResults(){const finished=DATA.matches.filter(m=>norm(m.Status)==='finished').sort((a,b)=>b.Date.localeCompare(a.Date));const upcoming=DATA.matches.filter(m=>norm(m.Status)!=='finished').sort((a,b)=>a.Date.localeCompare(b.Date));document.getElementById('resultsPanel').innerHTML=`<h2>рЯПЖ Results</h2><h3>Finished</h3>${finished.length?finished.map(matchLine).join(''):'<p class="muted">No finished matches.</p>'}<h3>Upcoming</h3>${upcoming.length?upcoming.map(matchLine).join(''):'<p class="muted">No upcoming matches.</p>'}`}
function renderCalendar(){const dates=[...new Set(DATA.matches.map(m=>m.Date))].sort();const first=dates[0]||new Date().toISOString().slice(0,10);const startOffset=weekDay(first);let grid=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>`<div class="dow">${d}</div>`);for(let i=0;i<35;i++){const iso=addDays(first,i-startOffset);const has=dates.includes(iso);grid.push(`<button class="day${has?' has':''}" onclick="showDate('${iso}',this)">${Number(iso.split('-')[2])}</button>`)}document.getElementById('calendarPanel').innerHTML=`<h2>рЯУЕ Calendar</h2><div class="calendar">${grid.join('')}</div><div id="dateMatches" class="dateMatches"></div>`}
function showDate(iso,btn){document.querySelectorAll('.day').forEach(d=>d.classList.remove('active'));btn.classList.add('active');const day=DATA.matches.filter(m=>m.Date===iso);document.getElementById('dateMatches').innerHTML=`<h3>${iso}</h3>${day.length?day.map(matchLine).join(''):'<p class="muted">No matches.</p>'}`}
function renderBracket(){const groups={};DATA.bracket.forEach(b=>{if(!groups[b.Stage])groups[b.Stage]=[];groups[b.Stage].push(b)});document.getElementById('bracketPanel').innerHTML='<h2>рЯ•Е Bracket</h2>'+Object.entries(groups).map(([stage,rows])=>`<div class="bracketStage"><h4>${stage}</h4>${rows.map(m=>`<div class="match"><div><b>${m.Team1}</b> ${score(m)} <b>${m.Team2}</b></div><span class="muted">${m.Winner?('Winner: '+m.Winner):''}</span></div>`).join('')}</div>`).join('')}
function renderFacts(){document.getElementById('factsPanel').innerHTML='<h2>рЯТ° Facts</h2>'+(DATA.facts.length?DATA.facts.map(f=>`<div class="factBox">${f}</div>`).join(''):'<p class="muted">No facts yet.</p>')}
async function shareCountry(country){const url=location.href.split('?')[0]+'?country='+encodeURIComponent(country);if(navigator.share){await navigator.share({title:'Blue Wave Football',text:'Follow '+country+' on Blue Wave Football',url})}else{navigator.clipboard.writeText(url);alert('Link copied')}}
async function shareApp(){if(navigator.share){await navigator.share({title:'Blue Wave Football',text:'Follow the World Cup with Blue Wave Football',url:location.href})}else{navigator.clipboard.writeText(location.href);alert('Link copied')}}
async function init(){try{const r=await fetch(API_URL+'?action=all');const j=await r.json();normalizeAll(j)}catch(e){console.error(e);alert('Could not load sheet data. Check Apps Script API.')}quickButtons();renderStandings();renderResults();renderCalendar();renderBracket();renderFacts();const p=new URLSearchParams(location.search);if(p.get('country')){document.getElementById('countryInput').value=p.get('country');loadCountry()}}
init();
</script>
</body>
</html>
